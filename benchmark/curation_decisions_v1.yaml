negative_questions:
  - category: fit_sizing
    question: "Do buyers report the exact chest measurement in inches for the size medium?"
    reason: "asks for precise numeric spec data that review text does not typically report"
  - category: fit_sizing
    question: "Does the manufacturer's official size chart match what buyers experience?"
    reason: "asks about the manufacturer's official chart, which review text does not describe"

  - category: colour_appearance
    question: "Does the dye lot number affect the shade of colour received?"
    reason: "asks about a manufacturing detail (dye lot) that never appears in consumer reviews"

  - category: fabric_quality
    question: "What is the exact thread count of the fabric used?"
    reason: "asks for a precise textile spec that review text does not report"
  - category: fabric_quality
    question: "Is the fabric OEKO-TEX certified according to buyers?"
    reason: "asks about a certification buyers would not know or mention"

  - category: durability
    question: "How many wash cycles on average does the product survive under controlled lab testing?"
    reason: "asks for controlled lab-test data, which review text never contains"
  - category: durability
    question: "Does the manufacturer offer a specific multi-year warranty on durability?"
    reason: "asks about seller warranty policy, not something reviewers report on"

  - category: defects
    question: "What percentage of units shipped have a manufacturing defect, according to internal QA data?"
    reason: "asks for internal seller QA statistics that are never in review text"
  - category: defects
    question: "Do buyers report the specific factory batch number associated with defective units?"
    reason: "asks for a level of manufacturing traceability reviewers never have or mention"

  - category: occasion
    question: "Is this item officially licensed or endorsed for use at professional sporting events?"
    reason: "asks about official licensing status, not something review text discusses"

  - category: value
    question: "What is the exact wholesale cost the seller pays for this item?"
    reason: "asks for confidential business data no consumer review would contain"
