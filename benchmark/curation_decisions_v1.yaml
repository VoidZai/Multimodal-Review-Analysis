# Human curation decisions for CRAGB draft questions (T2.3).
#
# Every quality-passed draft id from benchmark/cragb_draft.jsonl must
# appear in exactly one of `accepted` or `rejected` below —
# src/cragb/bench/curate.py enforces this and fails loudly on any gap or
# typo, so this is a complete, auditable record of every call made, not
# just the ones kept.
#
# `negative_questions` are authored directly here, not drafted by the
# LLM: T2.2's prompt only asked for answerable-style questions, so the
# deliberately-unanswerable quota T2.1 reserves per category (fixing
# PLAN.md risk C) is filled by hand at this stage. Each is phrased as a
# plausible shopper question that in practice asks for a level of detail
# (exact measurements, lab data, internal manufacturing/QA figures,
# certifications, warranty policy) that customer review text does not
# carry — pooling (T2.6) is expected to return an empty or near-empty
# pool for these, and the correct reference answer (T2.8) is "not enough
# information".

